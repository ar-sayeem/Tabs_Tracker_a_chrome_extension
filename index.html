<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <img src="icon.png" alt="logo" />
      <h1>Tabs Tracker</h1>
    </header>
    <input id="input-el" type="text" placeholder="Enter a URL..." />
    <div class="btn-group">
      <button id="input-btn" title="Save entered URL">SAVE INPUT</button>
      <button id="tab-btn" title="Save current tab URL">SAVE TAB</button>
      <button id="delete-btn" title="Double-click to clear all saved links">
        DELETE ALL
      </button>
    </div>

    <ul id="ul-el"></ul>

    <script src="index.js"></script>
  </body>
</html>
